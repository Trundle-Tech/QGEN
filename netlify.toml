# Netlify configuration for AI Quiz Generator

[build]
  # No build command needed - static files only
  publish = "."
  functions = "netlify/functions"

[functions]
  # Function timeout in seconds
  # Free tier: max 10 seconds
  # Pro tier: max 26 seconds
  # Background functions (Pro): max 900 seconds (15 min)
  # The app generates 1 question per API call to stay under the 10s free tier limit
  # Each question typically takes 2-5 seconds to generate

# Redirect API requests to Netlify Function
[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200

# Set cache headers for static assets
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
