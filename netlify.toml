# Netlify configuration for AI Quiz Generator

[build]
  # No build command needed - static files only
  publish = "."
  functions = "netlify/functions"

# Redirect API requests to Netlify Function
[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200

# Set cache headers for static assets
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
